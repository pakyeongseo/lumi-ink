<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>루미잉크 로그 템플릿 50종</title>
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#0e1016;color:#cfd4e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;padding:30px 14px 76px}
button,input{font:inherit}
.wrap{max-width:900px;margin:0 auto}
.top{text-align:center;margin:0 auto 28px;max-width:700px}
.brand{display:inline-flex;align-items:center;gap:7px;color:#8397d4;font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:9px}
.brand i{width:7px;height:7px;background:#7b9bff;clip-path:polygon(50% 0,61% 37%,100% 50%,61% 63%,50% 100%,39% 63%,0 50%,39% 37%);filter:drop-shadow(0 0 5px #7b9bff)}
.top h1{font-size:clamp(22px,4vw,30px);color:#f1f4ff;margin:0 0 10px;letter-spacing:-.03em}
.top p{font-size:13px;color:#8891a7;line-height:1.75;margin:3px 0}
.stats{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-top:14px}
.stat{border:1px solid #2a3040;background:#171b26;color:#a9b4d0;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:750}
.tools{position:sticky;top:10px;z-index:10;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin:0 auto 28px;padding:7px;background:rgba(20,23,32,.88);border:1px solid #2a3040;border-radius:15px;box-shadow:0 12px 30px rgba(0,0,0,.34);backdrop-filter:blur(14px)}
.tools input{min-width:0;border:0;outline:0;background:transparent;color:#edf1ff;padding:10px 11px;font-size:13px}
.tools input::placeholder{color:#667088}
.tools button{border:0;border-radius:10px;background:#23293a;color:#aeb9d6;padding:0 13px;font-size:12px;font-weight:750;cursor:pointer}
.tools button:disabled{opacity:.38;cursor:default}
.page-close{position:fixed;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:30;border:1px solid #343c52;border-radius:999px;background:rgba(24,28,40,.9);color:#dbe2f6;padding:8px 13px;font-size:11px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.3);backdrop-filter:blur(12px)}
.page-close:hover{background:#252c3e}.page-close:active{transform:scale(.96)}
.result{grid-column:1/-1;color:#707a91;font-size:10.5px;padding:0 10px 2px;text-align:left}
.section{margin-top:32px;scroll-margin-top:90px}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:0 2px 11px;padding-bottom:9px;border-bottom:1px solid #222838}
.section-title{display:flex;align-items:center;gap:8px;color:#eef2ff;font-size:15px;font-weight:850}
.section-title b{display:grid;place-items:center;min-width:23px;height:23px;padding:0 6px;border-radius:7px;background:#1c2232;color:#7f95d6;font-size:10px}
.section-copy{color:#69738a;font-size:10.5px;text-align:right}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{min-width:0;padding:10px;border:1px solid transparent;border-radius:16px;transition:border-color .18s,background .18s}
.card:hover{border-color:#272e40;background:#121620}
.meta{display:flex;align-items:center;gap:7px;margin:0 1px 5px;min-width:0}
.no{flex:0 0 auto;font-size:10px;font-weight:850;color:#65708c;background:#1a1e2b;border-radius:5px;padding:2px 6px}
.nm{min-width:0;font-size:13px;font-weight:850;color:#eef2ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.id{margin:0 1px 8px;color:#59637a;font:9.5px/1.4 ui-monospace,SFMono-Regular,Consolas,monospace;overflow-wrap:anywhere}
.desc{min-height:34px;margin:0 1px 9px;color:#8992a7;font-size:11px;line-height:1.55}
.preview{min-width:0}
.empty{display:none;margin:42px 0;padding:35px 18px;border:1px dashed #31384a;border-radius:16px;color:#7c869c;text-align:center;font-size:13px}
.foot{text-align:center;color:#565f74;font-size:10.5px;margin-top:38px;line-height:1.7}
@media(max-width:700px){body{padding-left:10px;padding-right:10px}.grid{grid-template-columns:1fr;gap:18px}.card{padding:8px 4px}.section-copy{display:none}.tools{top:6px}.desc{min-height:0}.top{padding:0 10px}}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.card{transition:none}}
</style>
</head>

    <div class="stats"><span class="stat">전체 50종 · 가나다순</span></div>

    <button id="clear" type="button" disabled>지우기</button>
    <div class="result" id="result">50종 모두 표시 중</div>
  </div>
  <section class="section" id="allSection">
    <div class="section-head"><div class="section-title">전체 템플릿 <b id="allCount">50</b></div><div class="section-copy">한글 이름 기준 가나다순</div></div>
    <div class="grid" id="allGrid"></div>
  </section>
  <div class="empty" id="empty">검색 결과가 없습니다.</div>

const SORTED=T.slice().sort(function(a,b){const byName=a.name.localeCompare(b.name,"ko",{sensitivity:"base"});return byName||a.id.localeCompare(b.id);});
const SAMPLE="[어느 날의 기록]\n\"이건 큰따옴표 대사예요.\"\n'이건 작은따옴표 속마음.'\n**굵게 강조**와 *기울임 보조*. 페르소나명 카엘이 가려집니다.";
function esc(value){return String(value).replace(/[&<>"]/g,function(char){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[char];});}
function styleAttr(style){return Object.entries(style||{}).map(function(entry){return entry[0]+":"+entry[1];}).join(";");}
function mergeStyle(a,b){return Object.assign({},a||{},b||{});}
function applyRule(segments,rule){const next=[];segments.forEach(function(segment){const text=segment.text||"";let regex;try{regex=new RegExp(rule.pattern,rule.flags);}catch(error){next.push(segment);return;}let last=0,match,count=0;while((match=regex.exec(text))&&count++<1000){if(!match[0]){regex.lastIndex+=1;continue;}const fullStart=match.index,fullEnd=fullStart+match[0].length;const capture=rule.capture>0&&typeof match[rule.capture]==="string"?match[rule.capture]:match[0];const inside=rule.capture>0?match[0].indexOf(capture):0;const targetStart=fullStart+Math.max(0,inside),targetEnd=targetStart+capture.length;if(rule.stripDelimiters){if(fullStart>last)next.push({text:text.slice(last,fullStart),style:segment.style});}else if(targetStart>last)next.push({text:text.slice(last,targetStart),style:segment.style});if(capture)next.push({text:capture,style:mergeStyle(segment.style,rule.style),masked:segment.masked});if(!rule.stripDelimiters&&fullEnd>targetEnd)next.push({text:text.slice(targetEnd,fullEnd),style:segment.style});last=fullEnd;}if(last<text.length)next.push({text:text.slice(last),style:segment.style,masked:segment.masked});else if(!text.length)next.push(segment);});return next;}
function applyMask(segments,name,alias,style){if(!name)return segments;const output=[];segments.forEach(function(segment){if(segment.masked){output.push(segment);return;}let at=0,index;while((index=segment.text.indexOf(name,at))>=0){if(index>at)output.push({text:segment.text.slice(at,index),style:segment.style});output.push({text:alias,style:mergeStyle(segment.style,style),masked:true});at=index+name.length;}if(at<segment.text.length)output.push({text:segment.text.slice(at),style:segment.style});else if(!segment.text.length)output.push(segment);});return output;}
function renderLine(text,template){let segments=[{text:String(text||""),style:{}}];template.rules.forEach(function(rule){segments=applyRule(segments,rule);});segments=applyMask(segments,"카엘",(template.persona.maskText||"•••").trim(),template.persona.style);return segments.map(function(segment){const style=styleAttr(segment.style),html=esc(segment.text);return style?'<span style="'+esc(style)+'">'+html+'</span>':html;}).join("");}
function renderPreview(template){const styles=template.styles,lines=SAMPLE.split(/\r?\n/);const body=lines.map(function(line){return line.length?'<div style="'+esc(styleAttr(styles.paragraph))+'">'+renderLine(line,template)+'</div>':'<div style="'+esc(styleAttr(styles.empty))+'"><br></div>';}).join("");return '<div style="'+esc(styleAttr(styles.canvas))+'"><div style="'+esc(styleAttr(styles.header))+'">SAMPLE LOG</div><div style="'+esc(styleAttr(styles.body))+'">'+body+'</div></div>';}
function cardHtml(template,index){return '<article class="card" data-search="'+esc((template.name+" "+template.id+" "+(template.description||"")).toLocaleLowerCase("ko"))+'"><div class="meta"><span class="no">'+String(index+1).padStart(2,"0")+'</span><span class="nm">'+esc(template.name)+'</span></div><div class="id">'+esc(template.id)+'</div><p class="desc">'+esc(template.description||"설명 없음")+'</p><div class="preview">'+renderPreview(template)+'</div></article>';}
document.getElementById("allGrid").innerHTML=SORTED.map(cardHtml).join("");
const search=document.getElementById("search"),clear=document.getElementById("clear"),result=document.getElementById("result");
document.getElementById("pageClose").addEventListener("click",function(){if(history.length>1)history.back();else window.close();});
function filterCards(){const query=search.value.trim().toLocaleLowerCase("ko");let visible=0;document.querySelectorAll(".card").forEach(function(card){const show=!query||card.dataset.search.includes(query);card.hidden=!show;if(show)visible+=1;});document.getElementById("allSection").hidden=visible===0;document.getElementById("allCount").textContent=visible;document.getElementById("empty").style.display=visible?"none":"block";result.textContent=query?visible+"종 검색됨":"50종 모두 표시 중";clear.disabled=!query;}
search.addEventListener("input",filterCards);
clear.addEventListener("click",function(){search.value="";filterCards();search.focus();});
