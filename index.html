<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0f17">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>루미잉크 — Lumink</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root {
    --bg: #0d0f17;
    --bg-2: #11141d;
    --surface: #181b26;
    --surface-2: #20242f;
    --surface-3: #272c39;
    --paper: #14161d;
    --ink: #e9eaf2;
    --muted: #9a9fb2;
    --faint: #626778;
    --line: #272b38;
    --line-soft: #1d212c;
    --accent: #6ad0ff;
    --accent-2: #7b9bff;
    --accent-deep: #2a4a78;
    --accent-soft: #16202f;
    --danger: #ff7a8a;
    --glow: 0 0 24px rgba(106,208,255,.22);
    --shadow: 0 2px 6px rgba(0,0,0,.4), 0 14px 40px rgba(0,0,0,.5);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --drawer-w: 308px;
  }
  html[data-theme="light"] {
    --bg: #f3f4f8;
    --bg-2: #eceef4;
    --surface: #ffffff;
    --surface-2: #f1f2f7;
    --surface-3: #e7e9f1;
    --paper: #fcfcfd;
    --ink: #1b1d27;
    --muted: #5e6377;
    --faint: #a3a8ba;
    --line: #e1e3ec;
    --line-soft: #ebedf3;
    --accent: #2f6fd0;
    --accent-2: #5a73d8;
    --accent-deep: #b9cdf0;
    --accent-soft: #e8eef9;
    --danger: #c2415a;
    --glow: 0 0 18px rgba(47,111,208,.14);
    --shadow: 0 1px 2px rgba(28,30,40,.06), 0 10px 30px rgba(28,30,40,.12);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
    font-size: 16px; line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    height: 100dvh; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(80% 50% at 12% -8%, rgba(106,208,255,.10), transparent 60%),
      radial-gradient(70% 45% at 100% 0%, rgba(123,155,255,.09), transparent 55%);
  }
  html[data-theme="light"] body::before { opacity: .5; }

  /* ===== Screen system ===== */
  .screen { display: none; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }
  .screen.active { display: flex; animation: screenIn .26s cubic-bezier(.22,.61,.36,1); }
  @keyframes screenIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }

  /* ===== Top bar (shared pattern) ===== */
  .topbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 4px;
    padding: calc(var(--safe-top) + 10px) 8px 10px;
    background: linear-gradient(var(--bg), var(--bg-2));
    border-bottom: 1px solid var(--line-soft);
    position: relative; z-index: 5;
  }
  .topbar .tb-title {
    flex: 1; min-width: 0; font-size: 17px; font-weight: 650;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px;
  }
  .topbar .tb-center {
    flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 9px;
  }
  .iconbtn {
    flex: 0 0 auto; width: 42px; height: 42px; display: grid; place-items: center;
    border: none; background: transparent; color: var(--ink);
    border-radius: 12px; cursor: pointer; transition: background .15s;
  }
  .iconbtn:active { background: var(--surface-2); }
  .iconbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* ===== Brand logo ===== */
  .brand-logo { display: inline-flex; align-items: center; gap: 9px; user-select: none; }
  .brand-logo .mark {
    width: 26px; height: 26px; border-radius: 8px;
    background: radial-gradient(circle at 38% 30%, #bfe9ff, #6ad0ff 45%, #3f7fd6 100%);
    box-shadow: 0 0 14px rgba(106,208,255,.5), inset 0 0 6px rgba(255,255,255,.4);
    position: relative; flex: 0 0 auto;
  }
  .brand-logo .mark::after {
    content: ""; position: absolute; left: 50%; top: 52%; width: 3px; height: 11px;
    transform: translate(-50%,-30%); border-radius: 3px;
    background: rgba(13,15,23,.6);
  }
  .brand-logo .word { font-size: 19px; font-weight: 750; letter-spacing: -.01em; }
  .brand-logo .word b { color: var(--accent); text-shadow: 0 0 14px rgba(106,208,255,.5); font-weight: 800; }

  /* ===== Home ===== */
  .home-scroll { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0 calc(120px + var(--safe-bottom)); }
  .home-actions {
    display: flex; gap: 10px; padding: 14px 16px 6px;
  }
  .action-card {
    flex: 1; display: flex; align-items: center; gap: 10px; justify-content: center;
    padding: 15px 12px; border-radius: 16px; cursor: pointer;
    font-size: 14.5px; font-weight: 650; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink); transition: transform .12s, border-color .15s;
  }
  .action-card:active { transform: scale(.97); }
  .action-card svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .action-card.primary {
    border-color: transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #07121f; box-shadow: var(--glow);
  }
  html[data-theme="light"] .action-card.primary { color: #fff; }

  .section-label {
    font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--faint); padding: 18px 20px 10px;
  }
  .proj-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px;
  }
  .proj-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
    padding: 16px 14px 14px; cursor: pointer; position: relative; overflow: hidden;
    transition: transform .12s, border-color .15s;
    display: flex; flex-direction: column; gap: 10px; min-height: 132px;
  }
  .proj-card:active { transform: scale(.975); }
  .proj-card::before {
    content: ""; position: absolute; inset: 0; opacity: .5; pointer-events: none;
    background: radial-gradient(60% 60% at 80% 0%, rgba(106,208,255,.07), transparent 70%);
  }
  .proj-icon {
    width: 52px; height: 52px; border-radius: 14px; position: relative; flex: 0 0 auto;
    display: grid; place-items: center; overflow: hidden;
    background: linear-gradient(150deg, var(--surface-2), var(--surface-3));
    border: 1px solid var(--line);
  }
  .proj-icon img { width: 100%; height: 100%; object-fit: cover; }
  .proj-icon .frame {
    position: absolute; inset: 0; border-radius: 14px; pointer-events: none;
    box-shadow: inset 0 0 0 1.5px rgba(106,208,255,.45), inset 0 0 14px rgba(106,208,255,.18);
  }
  .proj-icon .deflogo {
    width: 24px; height: 24px; border-radius: 7px;
    background: radial-gradient(circle at 38% 30%, #bfe9ff, #6ad0ff 45%, #3f7fd6 100%);
    box-shadow: 0 0 10px rgba(106,208,255,.45);
  }
  .proj-card .pc-name {
    font-size: 15px; font-weight: 650; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .proj-card .pc-meta { font-size: 12px; color: var(--faint); margin-top: auto; }
  .proj-card .pc-more {
    position: absolute; top: 8px; right: 6px; width: 32px; height: 32px;
    display: grid; place-items: center; border-radius: 9px; color: var(--muted);
  }
  .proj-card .pc-more:active { background: var(--surface-2); }
  .proj-card .pc-more svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

  .grid-empty { grid-column: 1 / -1; text-align: center; color: var(--faint); padding: 40px 20px; font-size: 14px; }

  /* ===== Project detail ===== */
  .pd-head {
    flex: 0 0 auto; padding: 8px 20px 20px; position: relative;
    background: linear-gradient(var(--bg-2), transparent);
    border-bottom: 1px solid var(--line-soft);
  }
  .pd-head .pd-name { font-size: 24px; font-weight: 750; letter-spacing: -.01em; margin: 4px 0 8px; }
  .pd-head .pd-desc {
    font-size: 14px; color: var(--muted); line-height: 1.6; white-space: pre-wrap;
    max-height: 22vh; overflow-y: auto;
  }
  .pd-head .pd-desc.empty { color: var(--faint); font-style: italic; }
  .pd-head .pd-count { font-size: 12px; color: var(--faint); margin-top: 10px; letter-spacing: .04em; }
  .pd-body { flex: 1 1 auto; overflow-y: auto; padding: 16px 16px calc(110px + var(--safe-bottom)); }

  .chip-list { display: flex; flex-direction: column; gap: 9px; }
  .memo-chip {
    display: flex; align-items: center; gap: 11px; padding: 13px 14px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    cursor: pointer; transition: transform .1s, border-color .15s; position: relative;
  }
  .memo-chip:active { transform: scale(.985); }
  .memo-chip .mc-dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; background: var(--faint); }
  .memo-chip .mc-body { flex: 1; min-width: 0; }
  .memo-chip .mc-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .memo-chip .mc-meta { font-size: 12px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .memo-chip .mc-type {
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 6px; flex: 0 0 auto;
    background: var(--surface-2); color: var(--muted);
  }

  /* ===== Read view ===== */
  .read-scroll { flex: 1 1 auto; overflow-y: auto; background: var(--paper); }
  .read-body {
    padding: 22px 18px calc(60px + var(--safe-bottom)); font-size: 16.5px; line-height: 1.7;
    color: var(--ink); word-break: break-word; overflow-wrap: anywhere;
  }
  .read-body img { max-width: 100%; height: auto; border-radius: 6px; }
  .read-body a { color: var(--accent); }
  .read-body table { border-collapse: collapse; max-width: 100%; }
  .read-body td, .read-body th { border: 1px solid var(--line); padding: 4px 8px; }
  .read-body blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 2px 0 2px 14px; color: var(--muted); }
  .read-body:empty::before { content: "(빈 메모)"; color: var(--faint); }

  /* ===== Editor (free memo) ===== */
  .formatbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 2px;
    padding: 4px 6px; background: var(--surface); border-bottom: 1px solid var(--line-soft);
    overflow-x: auto; white-space: nowrap; scrollbar-width: none;
  }
  .formatbar::-webkit-scrollbar { display: none; }
  .fbtn {
    flex: 0 0 auto; min-width: 38px; height: 36px; padding: 0 9px;
    border: none; background: transparent; color: var(--ink);
    border-radius: 9px; cursor: pointer; font-size: 15px; display: inline-grid; place-items: center;
  }
  .fbtn:active { background: var(--surface-2); }
  .fbtn.b { font-weight: 800; } .fbtn.i { font-style: italic; font-family: Georgia, serif; }
  .fbtn.u { text-decoration: underline; } .fbtn.s { text-decoration: line-through; }
  .fbtn svg { width: 19px; height: 19px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .fsep { flex: 0 0 auto; width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
  .fcolor { position: relative; width: 36px; height: 36px; flex: 0 0 auto; }
  .fcolor input[type=color] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; border: none; padding: 0; cursor: pointer; }
  .fcolor .swatch { pointer-events: none; position: absolute; inset: 7px; border-radius: 7px; border: 1px solid var(--line); background: var(--accent); }

  .code-toggle.active { color: #07121f; background: var(--accent); }
  .code-label { display: none; align-items: center; flex: 0 0 auto; font-size: 11.5px; font-weight: 700; letter-spacing: .06em; color: var(--accent); padding: 0 6px; white-space: nowrap; }
  body.code-mode .code-label { display: inline-flex; }
  body.code-mode .formatbar > *:not(.code-toggle):not(.code-label) { display: none; }

  .editor-wrap { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--paper); }
  .editor {
    min-height: 100%; padding: 20px 18px calc(40px + var(--safe-bottom)); outline: none;
    font-size: 16.5px; line-height: 1.7; color: var(--ink); word-break: break-word; overflow-wrap: anywhere;
  }
  .editor:empty::before { content: attr(data-placeholder); color: var(--faint); }
  .editor img { max-width: 100%; height: auto; border-radius: 6px; }
  .editor a { color: var(--accent); }
  .editor blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 2px 0 2px 14px; color: var(--muted); }
  .editor table { border-collapse: collapse; max-width: 100%; }
  .editor td, .editor th { border: 1px solid var(--line); padding: 4px 8px; }

  .code-area {
    display: none; flex: 1 1 auto; width: 100%; border: none; outline: none; resize: none; margin: 0;
    padding: 18px 16px calc(40px + var(--safe-bottom)); background: var(--paper); color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; tab-size: 2; overflow-y: auto;
  }
  .code-area::placeholder { color: var(--faint); }
  body.code-mode #screen-editor .editor-wrap { display: none; }
  body.code-mode #screen-editor .code-area { display: block; }

  .saver { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 0 6px; user-select: none; }
  .saver .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); transition: background .3s, transform .3s; }
  .saver.dirty .dot { background: var(--accent); transform: scale(1.25); box-shadow: 0 0 8px var(--accent); }
  .saver.saved .dot { background: #59d98b; }

  /* ===== FAB ===== */
  .fab {
    position: absolute; right: 18px; bottom: calc(22px + var(--safe-bottom)); z-index: 8;
    width: 58px; height: 58px; border-radius: 18px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #07121f;
    display: grid; place-items: center; box-shadow: var(--glow), 0 8px 22px rgba(0,0,0,.4);
    transition: transform .12s;
  }
  .fab:active { transform: scale(.92); }
  .fab svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  /* ===== Sidebar ===== */
  .scrim { position: fixed; inset: 0; background: rgba(5,6,10,.6); opacity: 0; visibility: hidden; transition: opacity .25s, visibility .25s; z-index: 40; }
  body.sidebar-open .scrim.for-sidebar { opacity: 1; visibility: visible; }
  .sidebar {
    position: fixed; top: 0; bottom: 0; left: 0; width: var(--drawer-w); max-width: 85vw;
    background: var(--bg-2); border-right: 1px solid var(--line);
    transform: translateX(-104%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 50; display: flex; flex-direction: column; box-shadow: var(--shadow);
  }
  body.sidebar-open .sidebar { transform: translateX(0); }
  .sb-head { padding: calc(var(--safe-top) + 18px) 18px 14px; border-bottom: 1px solid var(--line-soft); }
  .sb-section { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); padding: 16px 18px 8px; }
  .sb-list { flex: 1 1 auto; overflow-y: auto; padding: 0 10px 10px; }
  .sb-item {
    display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 12px;
    cursor: pointer; transition: background .12s;
  }
  .sb-item:active { background: var(--surface-2); }
  .sb-item.active { background: var(--accent-soft); }
  .sb-item .sb-ico { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; overflow: hidden; background: var(--surface-2); flex: 0 0 auto; }
  .sb-item .sb-ico img { width: 100%; height: 100%; object-fit: cover; }
  .sb-item .sb-ico .deflogo { width: 15px; height: 15px; border-radius: 5px; background: radial-gradient(circle at 38% 30%, #bfe9ff, #6ad0ff 45%, #3f7fd6 100%); box-shadow: 0 0 7px rgba(106,208,255,.4); }
  .sb-item .sb-name { flex: 1; min-width: 0; font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-item.active .sb-name { color: var(--accent); }
  .sb-item .sb-num { font-size: 12px; color: var(--faint); flex: 0 0 auto; }
  .sb-foot { flex: 0 0 auto; padding: 10px 12px calc(12px + var(--safe-bottom)); border-top: 1px solid var(--line-soft); display: flex; gap: 8px; }
  .sb-fbtn {
    flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 8px; border-radius: 11px; border: 1px solid var(--line); background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .sb-fbtn:active { background: var(--surface-2); }
  .sb-fbtn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* ===== Modal ===== */
  .modal-scrim { position: fixed; inset: 0; background: rgba(5,6,10,.66); opacity: 0; visibility: hidden; transition: opacity .2s, visibility .2s; z-index: 60; display: grid; place-items: center; padding: 24px; }
  .modal-scrim.open { opacity: 1; visibility: visible; }
  .modal {
    width: 100%; max-width: 400px; max-height: 84vh; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--line); border-radius: 22px;
    box-shadow: var(--shadow); transform: scale(.94); transition: transform .22s cubic-bezier(.34,1.4,.5,1);
    padding: 22px 20px calc(20px + var(--safe-bottom));
  }
  .modal-scrim.open .modal { transform: scale(1); }
  .modal h3 { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
  .modal .m-sub { margin: 0 0 18px; font-size: 13px; color: var(--muted); }

  .type-card {
    display: flex; align-items: center; gap: 14px; padding: 16px 14px; margin-bottom: 10px;
    border: 1px solid var(--line); border-radius: 16px; cursor: pointer; transition: border-color .15s, background .15s; position: relative;
  }
  .type-card:active { background: var(--surface-2); }
  .type-card.disabled { opacity: .5; cursor: default; }
  .type-card .tc-ico { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; flex: 0 0 auto; background: var(--accent-soft); color: var(--accent); }
  .type-card .tc-ico svg { width: 23px; height: 23px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .type-card .tc-name { font-size: 15.5px; font-weight: 650; }
  .type-card .tc-desc { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .type-card .tc-soon { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 700; letter-spacing: .05em; color: var(--faint); border: 1px solid var(--line); padding: 2px 7px; border-radius: 999px; }

  .proj-pick { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .pick-item {
    display: flex; align-items: center; gap: 11px; padding: 12px 13px; border-radius: 12px;
    border: 1px solid var(--line); cursor: pointer; transition: border-color .15s, background .15s;
  }
  .pick-item:active, .pick-item.sel { border-color: var(--accent); background: var(--accent-soft); }
  .pick-item .pk-ico { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; overflow: hidden; background: var(--surface-2); flex: 0 0 auto; }
  .pick-item .pk-ico img { width: 100%; height: 100%; object-fit: cover; }
  .pick-item .pk-ico .deflogo { width: 14px; height: 14px; border-radius: 4px; background: radial-gradient(circle at 38% 30%, #bfe9ff, #6ad0ff 45%, #3f7fd6 100%); }
  .pick-item .pk-name { flex: 1; font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pick-item .pk-check { color: var(--accent); opacity: 0; }
  .pick-item.sel .pk-check { opacity: 1; }
  .pick-item .pk-check svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.4; }

  .m-input, .m-textarea {
    width: 100%; border: 1px solid var(--line); background: var(--bg-2); color: var(--ink);
    border-radius: 12px; padding: 12px 14px; font-size: 15px; outline: none; font-family: inherit;
  }
  .m-input:focus, .m-textarea:focus { border-color: var(--accent); }
  .m-textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
  .m-field-label { font-size: 12px; font-weight: 600; color: var(--muted); margin: 12px 2px 6px; }

  .m-row { display: flex; gap: 10px; margin-top: 18px; }
  .m-btn {
    flex: 1; padding: 13px; border-radius: 13px; border: 1px solid var(--line); background: transparent;
    color: var(--ink); font-size: 15px; font-weight: 650; cursor: pointer;
  }
  .m-btn:active { background: var(--surface-2); }
  .m-btn.primary { border-color: transparent; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #07121f; box-shadow: var(--glow); }
  html[data-theme="light"] .m-btn.primary { color: #fff; }
  .m-btn.danger { color: var(--danger); border-color: transparent; }
  .m-btn:disabled { opacity: .45; }
  .m-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; padding: 6px 2px; }
  .m-link svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* chip color picker */
  .chip-palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 6px 0 4px; }
  .chip-swatch { aspect-ratio: 1; border-radius: 12px; cursor: pointer; position: relative; border: 2px solid transparent; transition: transform .1s; }
  .chip-swatch:active { transform: scale(.9); }
  .chip-swatch.sel { border-color: #fff; }
  .chip-swatch .none-mark { position: absolute; inset: 0; display: grid; place-items: center; color: var(--faint); }
  .chip-swatch .none-mark svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* ===== Action sheet (context menu) ===== */
  body.sheet-open .scrim.for-sheet { opacity: 1; visibility: visible; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; background: var(--surface);
    border-radius: 20px 20px 0 0; transform: translateY(102%);
    transition: transform .26s cubic-bezier(.4,0,.2,1); z-index: 70; padding-bottom: var(--safe-bottom);
    box-shadow: var(--shadow); border-top: 1px solid var(--line);
  }
  body.sheet-open .sheet { transform: translateY(0); }
  .sheet .grip { width: 38px; height: 4px; background: var(--line); border-radius: 999px; margin: 10px auto 4px; }
  .sheet .sheet-title { padding: 8px 20px 10px; font-size: 13px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sheet-item { display: flex; align-items: center; gap: 14px; padding: 15px 20px; cursor: pointer; font-size: 16px; color: var(--ink); }
  .sheet-item:active { background: var(--surface-2); }
  .sheet-item svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }
  .sheet-item.danger { color: var(--danger); }
  .sheet-item:last-child { margin-bottom: 6px; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: calc(30px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px);
    background: var(--surface-3); color: var(--ink); border: 1px solid var(--line);
    padding: 12px 20px; border-radius: 999px; font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 90; max-width: 86vw; text-align: center; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden-input { display: none; }
</style>
</head>
<body>

  <!-- ============ HOME ============ -->
  <section class="screen" id="screen-home">

      <div class="tb-title" id="pdTopTitle">프로젝트</div>
      <button class="iconbtn" id="pdMore" aria-label="더보기"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></button>
    </div>
    <div class="pd-head">
      <div class="pd-name" id="pdName">프로젝트</div>
      <div class="pd-desc" id="pdDesc"></div>

    </div>

    <button class="fab" id="pdFab" aria-label="이 프로젝트에 새 메모"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  </section>

  <!-- ============ READ ============ -->
  <section class="screen" id="screen-read">
    <div class="topbar">
      <button class="iconbtn nav-back" aria-label="뒤로"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="tb-title" id="readTitle">메모</div>
      <button class="iconbtn" id="readEdit" aria-label="편집"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="iconbtn" id="readMore" aria-label="더보기"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></button>
    </div>
    <div class="read-scroll"><div class="read-body" id="readBody"></div></div>

  <!-- ============ EDITOR (free memo) ============ -->
  <section class="screen" id="screen-editor">
    <div class="topbar">
      <button class="iconbtn" id="edBack" aria-label="뒤로"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="tb-title" id="edTitle">메모</div>
      <div class="saver" id="saver"><span class="dot"></span><span id="saverText"></span></div>
      <button class="iconbtn" id="edMore" aria-label="더보기"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></button>
    </div>
    <div class="formatbar" id="formatbar">
      <button class="fbtn code-toggle" id="codeToggle" title="코드 보기 / 편집"><svg viewBox="0 0 24 24"><path d="M9 7l-5 5 5 5M15 7l5 5-5 5"/></svg></button>
      <span class="code-label" id="codeLabel">HTML 소스 편집 중</span>
      <span class="fsep"></span>
      <button class="fbtn b" data-cmd="bold" title="굵게">B</button>
      <button class="fbtn i" data-cmd="italic" title="기울임">I</button>
      <button class="fbtn u" data-cmd="underline" title="밑줄">U</button>
      <button class="fbtn s" data-cmd="strikeThrough" title="취소선">S</button>
      <span class="fsep"></span>
      <span class="fcolor"><input type="color" id="colorPick" value="#6ad0ff"><span class="swatch" id="colorSwatch"></span></span>
      <button class="fbtn" data-cmd="hiliteColor" data-val="#ffe27a" title="형광펜" style="font-weight:700;background:linear-gradient(transparent 60%, #ffe27a 60%);color:#222">H</button>
      <span class="fsep"></span>
      <button class="fbtn" data-cmd="insertUnorderedList" title="목록"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button class="fbtn" data-cmd="insertOrderedList" title="번호 목록"><svg viewBox="0 0 24 24"><path d="M9 6h12M9 12h12M9 18h12"/><path d="M3 5h1.5v3M3 11.5h2l-2 2.5h2"/></svg></button>
      <span class="fsep"></span>
      <button class="fbtn" data-cmd="removeFormat" title="서식 지우기"><svg viewBox="0 0 24 24"><path d="M4 7h16M7 7l3 13M14 7l-1 5M18 20L6 8"/></svg></button>

    </div>
    <div class="editor-wrap" id="editorWrap"><div class="editor" id="editor" contenteditable="true" data-placeholder="여기에 메모를 작성하거나 붙여넣으세요…"></div></div>
    <textarea class="code-area" id="codeArea" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="<!-- 이 메모의 HTML 소스 -->"></textarea>

  <!-- ============ SIDEBAR ============ -->
  <div class="scrim for-sidebar" id="sidebarScrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-head"><span class="brand-logo"><span class="mark"></span><span class="word">루미<b>잉크</b></span></span></div>
    <div class="sb-section">프로젝트</div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-foot">
      <button class="sb-fbtn" id="sbNewProject"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 프로젝트</button>
      <button class="sb-fbtn" id="sbImport"><svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"/></svg> 열기</button>
      <button class="sb-fbtn" id="sbTheme" aria-label="테마"><svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    </div>

  <!-- ============ MODALS ============ -->

  <!-- ============ ACTION SHEET ============ -->
  <div class="scrim for-sheet" id="sheetScrim"></div>

  <input type="file" id="fileInput" class="hidden-input" accept=".html,.htm,text/html">
  <input type="file" id="iconInput" class="hidden-input" accept="image/*">
  <div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   루미잉크 (Lumink) — 1차 셸
   데이터: IndexedDB (projects, notes) / 마이그레이션 포함
   ============================================================ */
(function () {
  /* ---------- chip colors (명세 10종) ---------- */
  const CHIP = {
    pink:   { name: "루미 핑크",    c: "#ff8fbf" },
    coral:  { name: "코랄 잉크",    c: "#ff9d80" },
    orange: { name: "선셋 오렌지",  c: "#ffb072" },
    gold:   { name: "골드 글로우",  c: "#ffd87a" },
    green:  { name: "포레스트 그린",c: "#9be08a" },
    mint:   { name: "아쿠아 민트",  c: "#7fe6c4" },
    cyan:   { name: "네온 시안",    c: "#6fd6ff" },
    blue:   { name: "미드나잇 블루",c: "#8aa2ff" },
    purple: { name: "라벤더 퍼플",  c: "#c79bff" },
    grey:   { name: "미스티 그레이",c: "#b8bdcc" }
  };
  const TYPE_LABEL = { free: "자유", lorebook: "로어북", persona: "페르소나" };

  /* ---------- IndexedDB ---------- */
  const DB_NAME = "inkMemoDB", DB_VER = 2;
  let db = null;

  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains("notes")) {
          const os = d.createObjectStore("notes", { keyPath: "id" });
          os.createIndex("updatedAt", "updatedAt");
        }
        if (!d.objectStoreNames.contains("projects")) {
          d.createObjectStore("projects", { keyPath: "id" });
        }
      };
      r.onsuccess = (e) => { db = e.target.result; res(db); };
      r.onerror = (e) => rej(e.target.error);
    });
  }
  function store(name, mode) { return db.transaction(name, mode).objectStore(name); }
  function getAll(name) {
    return new Promise((res, rej) => { const r = store(name, "readonly").getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); });
  }
  function put(name, obj) {
    return new Promise((res, rej) => { const r = store(name, "readwrite").put(obj); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
  }
  function del(name, id) {
    return new Promise((res, rej) => { const r = store(name, "readwrite").delete(id); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
  }

  /* ---------- State ---------- */
  let projects = [], notes = [];
  let curProjectId = null, curNoteId = null;
  let codeMode = false, theme = "dark";
  let saveTimer = null;
  let viewStack = [{ s: "home" }];

  /* ---------- Helpers ---------- */
  const $ = (id) => document.getElementById(id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => Date.now();
  function esc(s) { return (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function fmtDate(ts) {
    const d = new Date(ts), n = new Date(), pad = (x) => String(x).padStart(2, "0");
    if (d.toDateString() === n.toDateString()) return `오늘 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const y = new Date(n); y.setDate(n.getDate() - 1);
    if (d.toDateString() === y.toDateString()) return "어제";
    if (d.getFullYear() === n.getFullYear()) return `${d.getMonth() + 1}월 ${d.getDate()}일`;
    return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())}`;
  }
  function plainText(html) { const t = document.createElement("div"); t.innerHTML = html || ""; return (t.textContent || "").trim().replace(/\s+/g, " "); }
  function deriveTitle(html) { const t = plainText(html); return t ? t.slice(0, 40) : "제목 없는 메모"; }
  function preview(html) { return plainText(html).slice(0, 60); }

  let toastTimer = null;
  function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1900); }

  function noteHtml(n) { return (n && n.data && typeof n.data.html === "string") ? n.data.html : ""; }
  function notesOf(pid) { return notes.filter((n) => n.projectId === pid).sort((a, b) => b.updatedAt - a.updatedAt); }
  function getProject(id) { return projects.find((p) => p.id === id); }
  function getNote(id) { return notes.find((n) => n.id === id); }

  /* ---------- expose for part 2 ---------- */
  window.__lumink = {
    CHIP, TYPE_LABEL, get db(){return db;}, openDB, store, getAll, put, del,
    state: {
      get projects(){return projects;}, set projects(v){projects=v;},
      get notes(){return notes;}, set notes(v){notes=v;},
      get curProjectId(){return curProjectId;}, set curProjectId(v){curProjectId=v;},
      get curNoteId(){return curNoteId;}, set curNoteId(v){curNoteId=v;},
      get codeMode(){return codeMode;}, set codeMode(v){codeMode=v;},
      get theme(){return theme;}, set theme(v){theme=v;},
      get saveTimer(){return saveTimer;}, set saveTimer(v){saveTimer=v;},
      get viewStack(){return viewStack;}, set viewStack(v){viewStack=v;}
    },
    h: { $, uid, now, esc, fmtDate, plainText, deriveTitle, preview, toast, noteHtml, notesOf, getProject, getNote }
  };
})();
</script>
<script src="./app.js"></script>
</body>
