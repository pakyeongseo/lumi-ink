<!doctype html><meta charset="utf-8"><style>
body{margin:0;padding:80px;background:#1b2130;display:flex;gap:80px;align-items:flex-start;font-family:sans-serif}
.demo{width:420px;height:260px;position:relative;background:linear-gradient(135deg,#456a9a,#1a314f);border-radius:12px}
.idea-media-frame{position:absolute;inset:-10px;z-index:5;pointer-events:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}.idea-frame-9slice{position:absolute;inset:0;display:grid;grid-template-columns:42px minmax(0,1fr) 42px;grid-template-rows:42px minmax(0,1fr) 42px;overflow:visible}.idea-frame-9slice>svg{width:100%;height:100%;display:block;overflow:hidden}.idea-frame-slice-c{display:block}
.demo2{width:240px;height:400px;position:relative;background:linear-gradient(135deg,#96644f,#422339);border-radius:12px}
</style><script src="assets-frames.js"></script><body><div class="demo" id="a"></div><div class="demo2" id="b"></div><script>
function resolveFrameColor(v){return v}
function frameNineSliceMarkup(fid,color){const f=window.__luminkFrames.find(x=>x.id===fid);const inner=f.build(color);const svg=(v,s,r)=>`<svg class="idea-frame-slice-${r}" viewBox="${v}" xmlns="http://www.w3.org/2000/svg"${s?' preserveAspectRatio="none"':''}>${inner}</svg>`;return `<span class="idea-frame-9slice">${svg('0 0 28 28',false,'tl')}${svg('28 0 44 28',true,'t')}${svg('72 0 28 28',false,'tr')}${svg('0 28 28 44',true,'l')}<span class="idea-frame-slice-c"></span>${svg('72 28 28 44',true,'r')}${svg('0 72 28 28',false,'bl')}${svg('28 72 44 28',true,'b')}${svg('72 72 28 28',false,'br')}</span>`}
a.innerHTML='<div class="idea-media-frame">'+frameNineSliceMarkup('baroque','#d4af37')+'</div>';b.innerHTML='<div class="idea-media-frame">'+frameNineSliceMarkup('royal','#d4af37')+'</div>';
</script>
