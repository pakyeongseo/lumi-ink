<!doctype html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3d2b67"><link rel="manifest" href="./manifest-violet.json"><title>루미잉크 설치 · 바이올렛</title>
<style>html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Segoe UI",sans-serif;background:#3d2b67;color:#ffffff}body{display:grid;place-items:center;padding:24px;box-sizing:border-box}main{width:min(420px,100%);text-align:center;text-shadow:none}img{width:118px;height:118px;border-radius:28px;box-shadow:0 18px 44px rgba(0,0,0,.27)}h1{font-size:27px;margin:22px 0 8px}p{line-height:1.6;color:rgba(255,255,255,.82);margin:0 0 22px}button,a{display:inline-flex;justify-content:center;align-items:center;width:100%;box-sizing:border-box;min-height:52px;border:0;border-radius:15px;background:#fff;color:#3d2b67;font-weight:800;font-size:15px;text-decoration:none;cursor:pointer;margin-top:10px;text-shadow:none}.sub{background:rgba(255,255,255,.12);color:#ffffff;border:1px solid rgba(255,255,255,.20)}small{display:block;color:rgba(255,255,255,.65);line-height:1.5;margin:18px 5px 0}</style></head>
<body><main><img src="./icon-violet-512.png" alt="바이올렛 아이콘"><h1>루미잉크</h1><p><b>바이올렛</b> 아이콘으로 설치합니다.</p><button id="installBtn">이 아이콘으로 설치</button><a class="sub" href="./">앱으로 돌아가기</a><small id="hint">설치 후 아이콘을 바꾸려면 기존 앱을 제거한 뒤 다른 아이콘으로 다시 설치해 주세요.</small></main><script>let promptEvent=null;const btn=document.getElementById('installBtn'),hint=document.getElementById('hint');window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();promptEvent=e;});btn.addEventListener('click',async()=>{if(promptEvent){promptEvent.prompt();await promptEvent.userChoice;promptEvent=null;return;}hint.textContent='브라우저 메뉴에서 “앱 설치” 또는 “홈 화면에 추가”를 선택해 주세요.';});window.addEventListener('appinstalled',()=>{hint.textContent='설치가 완료됐어요. 이제 루미잉크를 실행해 보세요.';btn.disabled=true;btn.textContent='설치 완료';});</script></body></html>
